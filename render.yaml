services:
  - type: web
    name: devchrono-api
    runtime: node
    plan: free
    # --include=dev overrides npm's default of omitting devDependencies
    # (typescript, @types/*) whenever NODE_ENV=production is set, which it
    # is below — Render exposes that env var during the build step too, not
    # just at runtime, so a plain `npm install` here silently drops the
    # packages the TypeScript build needs.
    buildCommand: npm install --include=dev && npm run build --workspace=packages/shared && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGIN
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: RATE_LIMIT_JSON_MAX
        value: "30"
      - key: RATE_LIMIT_HTTP_INSPECT_MAX
        value: "20"
      - key: RATE_LIMIT_WEBHOOK_MAX
        value: "120"
      - key: BODY_LIMIT_DEFAULT
        value: 1mb
      - key: BODY_LIMIT_JSON
        value: 10mb
      - key: LOG_LEVEL
        value: info
      - key: API_VERSION
        value: v1
